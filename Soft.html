<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поиск прошивок</title>
<style>
  :root{
    --bg:#0a0a0c;--panel:#141417;--panel-2:#1c1c20;--line:#2a2a30;
    --txt:#e8e6e3;--muted:#8a8a92;--amber:#ffb020;--orange:#ff6a1a;--red:#e01f1f;
    --heat:linear-gradient(90deg,var(--amber),var(--orange),var(--red));
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace}
  body{padding:18px;max-width:820px;margin:0 auto;font-size:14px;line-height:1.5}
  header{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
  h1{font-size:17px;margin:0 0 4px;letter-spacing:.5px}
  h1 .bar{display:inline-block;width:10px;height:16px;background:var(--heat);
    margin-right:9px;vertical-align:-2px;border-radius:1px}
  .sub{color:var(--muted);font-size:11.5px}
  .sub .lockstate{color:var(--red)} .sub .lockstate.ok{color:var(--amber)}
  label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;
    letter-spacing:1px;margin:0 0 6px}
  input[type=text],input[type=password]{width:100%;background:var(--panel);
    border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:8px;
    font:inherit;font-size:13.5px}
  input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,106,26,.15)}
  .field{margin-bottom:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .row .field{flex:1;margin-bottom:0;min-width:180px}
  button{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);
    padding:11px 16px;border-radius:8px;font:inherit;font-size:13px;cursor:pointer;transition:.15s}
  button:hover:not(:disabled){border-color:var(--orange)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.go{background:var(--heat);border:none;color:#120a02;font-weight:700}
  button.go:hover:not(:disabled){filter:brightness(1.08)}
  button.stop{border-color:#5a2020;color:#ff8b7a}
  button.stop:hover:not(:disabled){border-color:var(--red);background:#2a1010}
  .sources{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:14px}
  .sources .cap{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
  .cb{display:flex;align-items:center;gap:9px;font-size:13px;padding:5px 0;cursor:pointer;user-select:none}
  .cb input{accent-color:var(--orange);width:16px;height:16px;flex-shrink:0}
  .toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;
    cursor:pointer;user-select:none;margin:12px 0 4px}
  .toggle input{accent-color:var(--orange);width:15px;height:15px}
  .statbar{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap;margin:16px 0 10px}
  #status{font-size:12px;color:var(--muted);min-height:16px;flex:1;min-width:160px}
  #status b{color:var(--amber)} .err{color:#ff8b7a !important} .count{color:var(--txt)}
  #timer{font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    border-radius:7px;padding:5px 10px;white-space:nowrap}
  #timer b{color:var(--amber)}
  .list{display:flex;flex-direction:column;gap:8px}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:9px;
    padding:12px 13px;display:flex;flex-direction:column;align-items:stretch}
  .item .name{font-size:13.5px;word-break:break-all}
  .item .name .hit{background:rgba(255,176,32,.22);color:var(--amber);border-radius:3px;padding:0 2px}
  .item .path{color:var(--muted);font-size:11px;margin-top:3px;word-break:break-all}
  .item .path .src{color:var(--orange)}
  .item .size{color:var(--muted);font-size:11px;margin-top:2px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
  .dl,.act{border:1px solid var(--line);padding:9px 14px;border-radius:8px;font:inherit;
    font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
  .dl{background:var(--heat);border:none;color:#120a02;font-weight:700}
  .dl:hover:not(:disabled){filter:brightness(1.08)}
  .act{background:var(--panel-2);color:var(--muted)}
  .act:hover:not(:disabled){border-color:var(--orange);color:var(--txt)}
  .dl:disabled,.act:disabled{opacity:.45;cursor:not-allowed}
  .linkbox{margin-top:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .rawlink{display:block;color:var(--amber);font-size:11.5px;word-break:break-all;text-decoration:none}
  .rawlink:active,.rawlink:hover{text-decoration:underline}
  .linkhint{color:var(--muted);font-size:10.5px;margin-top:6px;line-height:1.5}
  /* блок изменения ссылок */
  .editwrap{margin-top:22px;padding-top:16px;border-top:1px solid var(--line)}
  #editPanel{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px;margin-top:12px}
  #editPanel.shake{animation:shk .35s}
  #editPanel .msg{color:#ff8b7a;font-size:11.5px;height:14px;margin-top:8px}
  #editPanel .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  /* экран блокировки */
  #lock{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:26px 22px;text-align:center;max-width:340px;margin:40px auto}
  #lock .ico{font-size:26px;margin-bottom:10px}
  #lock h2{margin:0 0 4px;font-size:14px;letter-spacing:1px;color:var(--red)}
  #lock p{color:var(--muted);font-size:11.5px;margin:0 0 18px}
  #lock input{text-align:center;font-size:18px;letter-spacing:6px;margin-bottom:12px}
  #lock button{width:100%}
  #lock.shake{animation:shk .35s}
  @keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  #lock .msg{color:#ff8b7a;font-size:11.5px;height:14px;margin-top:8px}
  #app{display:none}
</style>
</head>
<body>
<header>
  <h1><span class="bar"></span>ПОИСК ПРОШИВОК</h1>
  <div class="sub">Статус: <span class="lockstate" id="lockLabel">заблокировано 🔒</span></div>
</header>

<!-- БЛОКИРОВКА -->
<div id="lock">
  <div class="ico">🔒</div>
  <h2>ПОИСК ЗАБЛОКИРОВАН</h2>
  <p>Введите пароль для доступа</p>
  <input type="password" id="pass" inputmode="numeric" placeholder="••••" autocomplete="off">
  <button class="go" id="unlock">Разблокировать</button>
  <div class="msg" id="lockMsg"></div>
</div>

<!-- ПРИЛОЖЕНИЕ -->
<div id="app">
  <div class="sources">
    <div class="cap">Где искать</div>
    <label class="cb"><input type="checkbox" id="cbClients" checked> Клиенты</label>
    <label class="cb"><input type="checkbox" id="cbShop" checked> Магазин (только Евро2)</label>
  </div>

  <div class="row">
    <div class="field">
      <label>Номер / имя прошивки</label>
      <input type="text" id="query" placeholder="напр. 4G0907115P или ME17.9.21" autocomplete="off">
    </div>
    <button class="go" id="btnFind">Найти</button>
    <button id="btnAll">Показать всё</button>
    <button class="stop" id="btnStop" disabled>■ Стоп</button>
  </div>
  <label class="toggle"><input type="checkbox" id="deep" checked> искать в подпапках</label>

  <div class="statbar">
    <div id="status"></div>
    <div id="timer">⏱ —</div>
  </div>
  <div class="list" id="results"></div>

  <!-- ИЗМЕНИТЬ ССЫЛКИ -->
  <div class="editwrap">
    <button class="act" id="btnEdit">✎ Изменить ссылки</button>
    <div id="editPanel" hidden>
      <div id="editPass">
        <div class="field">
          <label>Пароль для изменения</label>
          <input type="password" id="editPassInput" inputmode="numeric" placeholder="••••" autocomplete="off">
        </div>
        <div class="btns">
          <button class="go" id="editPassBtn">Ок</button>
          <button class="act" id="editCancel1">Отмена</button>
        </div>
        <div class="msg" id="editMsg"></div>
      </div>
      <div id="editFields" hidden>
        <div class="field"><label>Ссылка «Клиенты»</label><input type="text" id="urlClients"></div>
        <div class="field"><label>Ссылка «Магазин (только Евро2)»</label><input type="text" id="urlShop"></div>
        <div class="btns">
          <button class="go" id="editSave">Сохранить</button>
          <button class="act" id="editCancel2">Отмена</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API='https://cloud-api.yandex.net/v1/disk/public/resources';
const PASS_UNLOCK='5230';
const PASS_EDIT='2580';
const DEFAULTS={
  clients:{name:'Клиенты', url:'https://disk.yandex.ru/d/gC6FL2TBl1b25Q'},
  shop:{name:'Магазин (только Евро2)', url:'https://disk.yandex.ru/d/psBxTNkiFyQTjg'}
};
const ALLOWED=['.bin','.bcf'];
const $=id=>document.getElementById(id);

/* источники + сохранение изменённых ссылок */
function loadSources(){
  let s={}; try{ s=JSON.parse(localStorage.getItem('fw_sources')||'{}'); }catch(_){}
  return {
    clients:{name:DEFAULTS.clients.name, url:s.clients||DEFAULTS.clients.url},
    shop:{name:DEFAULTS.shop.name, url:s.shop||DEFAULTS.shop.url}
  };
}
let SRC=loadSources();
function saveSources(){ localStorage.setItem('fw_sources',JSON.stringify({clients:SRC.clients.url, shop:SRC.shop.url})); }

/* ---------- БЛОКИРОВКА ---------- */
function tryUnlock(){
  if($('pass').value.trim()===PASS_UNLOCK){
    $('lock').style.display='none'; $('app').style.display='block';
    const l=$('lockLabel'); l.textContent='разблокировано 🔓'; l.className='lockstate ok';
    $('query').focus();
  } else { shake($('lock')); $('lockMsg').textContent='Неверный пароль'; $('pass').value=''; $('pass').focus(); }
}
function shake(el){ el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); }
$('unlock').addEventListener('click',tryUnlock);
$('pass').addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });

/* ---------- ПОИСК ---------- */
const statusEl=$('status'), resultsEl=$('results');
function setStatus(html,err=false){ statusEl.className=err?'err':''; statusEl.innerHTML=html; }
function setTime(sec){ $('timer').innerHTML='⏱ <b>'+sec+'</b> с'; }
function isFw(name){ const n=name.toLowerCase(); return ALLOWED.some(e=>n.endsWith(e)); }
function fmtSize(b){ if(b==null) return ''; const u=['Б','КБ','МБ','ГБ']; let i=0,n=b;
  while(n>=1024&&i<u.length-1){n/=1024;i++;} return n.toFixed(i?1:0)+' '+u[i]; }

let searching=false, controller=null;
const srcCache={};   // ключ url|deep -> файлы[]
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// fetch с ретраями на таймауты/сетевые сбои/429/5xx
async function fetchJson(u){
  let lastErr;
  for(let a=0;a<4;a++){
    if(controller.signal.aborted) throw new DOMException('Aborted','AbortError');
    try{
      const r=await fetch(u,{signal:controller.signal});
      if(r.status===404) throw new Error('папка не найдена');
      if(r.status===429||r.status>=500){ lastErr=new Error('HTTP '+r.status); await sleep(600*(a+1)); continue; }
      if(!r.ok) throw new Error('HTTP '+r.status);
      return await r.json();
    }catch(e){
      if(e.name==='AbortError'||e.message==='папка не найдена') throw e;
      lastErr=e; await sleep(600*(a+1));
    }
  }
  throw lastErr||new Error('сеть');
}

async function crawl(publicKey, deep, onBatch){
  let requests=0; const MAX_REQ=5000;   // фактически без ограничения
  async function listOne(path){
    let offset=0; const limit=200;
    while(true){
      if(controller.signal.aborted) throw new DOMException('Aborted','AbortError');
      if(requests++ > MAX_REQ) throw new Error('Очень большой каталог — обход прерван.');
      const u=new URL(API);
      u.searchParams.set('public_key',publicKey);
      if(path) u.searchParams.set('path',path);
      u.searchParams.set('limit',limit); u.searchParams.set('offset',offset); u.searchParams.set('sort','name');
      const data=await fetchJson(u); const emb=data._embedded; if(!emb) break;
      const pageFiles=[], subdirs=[];
      for(const it of emb.items){ if(it.type==='file') pageFiles.push(it); else if(it.type==='dir') subdirs.push(it.path); }
      if(pageFiles.length) onBatch(pageFiles);           // отдаём найденное сразу
      const total=emb.total||emb.items.length; offset+=limit;
      if(deep) for(const p of subdirs){ await listOne(p); }
      if(offset>=total) break;
    }
  }
  await listOne('');
}

async function crawlSource(src, deep, emit){
  const key=src.url+'|'+deep;
  if(srcCache[key]){ emit(srcCache[key]); return; }      // из кэша — сразу всё
  const collected=[];
  await crawl(src.url, deep, batch=>{
    batch.forEach(f=>{ f._pub=src.url; f._src=src.name; });
    collected.push(...batch);
    emit(batch);
  });
  srcCache[key]=collected;                               // кэшируем только полный обход
}

function setSearchingUI(on){
  searching=on;
  ['btnFind','btnAll','cbClients','cbShop','deep','btnEdit'].forEach(id=>$(id).disabled=on);
  $('btnStop').disabled=!on;
}

async function run(filterMode){
  if(searching) return;
  const qRaw=$('query').value.trim(); const q=qRaw.toLowerCase();
  const deep=$('deep').checked;
  const selected=[];
  if($('cbClients').checked) selected.push(SRC.clients);
  if($('cbShop').checked) selected.push(SRC.shop);
  if(!selected.length){ setStatus('Отметь хотя бы одну папку.',true); return; }
  if(filterMode && !q){ setStatus('Введи номер прошивки или нажми «Показать всё».',true); return; }

  resultsEl.innerHTML='';                    // очищаем один раз при старте
  let shown=0, base=0; const seen=new Set();
  function emit(batch){
    for(const f of batch){
      if(!isFw(f.name)) continue; base++;
      if(filterMode && !f.name.toLowerCase().includes(q)) continue;
      const idk=(f._pub||'')+'|'+(f.path||f.name);
      if(seen.has(idk)) continue; seen.add(idk);
      appendItem(f,q); shown++;
    }
    setStatus(`⟳ Сканирую… найдено: <span class="count">${shown}</span>`);
  }

  controller=new AbortController(); setSearchingUI(true); setStatus('⟳ Сканирую…');
  const t0=performance.now(); const errs=[];
  try{
    for(const s of selected){
      try{ await crawlSource(s,deep,emit); }
      catch(e){ if(e.name==='AbortError') throw e; errs.push(`${s.name}: ${e.message}`); }
    }
    setTime(((performance.now()-t0)/1000).toFixed(1));
    if(shown>0){
      let msg=`Найдено: <span class="count">${shown}</span>`+(filterMode?` · просмотрено .bin/.bcf: ${base}`:'');
      if(errs.length) msg+=` <br>Пропущено: ${errs.join('; ')}`;
      setStatus(msg,false);
    } else if(errs.length){
      setStatus('Ошибка папок: '+errs.join('; '),true);
    } else {
      setStatus(filterMode?`Ничего не найдено по «${qRaw}». Файлов .bin/.bcf: ${base}.`:'Нет файлов .bin/.bcf.',true);
    }
  }catch(e){
    setTime(((performance.now()-t0)/1000).toFixed(1));
    if(e.name==='AbortError')
      setStatus(`■ Остановлено. Найдено: <span class="count">${shown}</span> — файлы сохранены.`,false);
    else
      setStatus((e.message||'Ошибка')+' <br>Если CORS/сеть — открой по https:// (GitHub Pages).',true);
  }finally{ setSearchingUI(false); controller=null; }
}

function appendItem(f,q){
  const div=document.createElement('div'); div.className='item';
  let nameHtml=f.name;
  if(q){ const i=f.name.toLowerCase().indexOf(q);
    if(i>=0) nameHtml=f.name.slice(0,i)+'<span class="hit">'+f.name.slice(i,i+q.length)+'</span>'+f.name.slice(i+q.length); }
  let path=(f.path||'').replace(/^disk:\//,'').replace('/'+f.name,'');
  const meta=document.createElement('div'); meta.className='meta';
  meta.innerHTML=`<div class="name">${nameHtml}</div>`+
    `<div class="path"><span class="src">${f._src||''}</span>${path?' / '+path+'/':''}</div>`+
    `<div class="size">${fmtSize(f.size)}</div>`;
  const linkbox=document.createElement('div'); linkbox.className='linkbox'; linkbox.hidden=true;
  meta.appendChild(linkbox);

  const actions=document.createElement('div'); actions.className='actions';
  const bDl=mkBtn('СКАЧАТЬ','dl'), bLink=mkBtn('🔗 Ссылка','act');
  bDl.onclick  =()=>withBusy(bDl,  async()=>{ await doDownload(f); });
  bLink.onclick=()=>withBusy(bLink,async()=>{ showLink(linkbox, await resolveHref(f)); });
  actions.append(bDl,bLink);

  div.append(meta,actions); resultsEl.appendChild(div);
}

function mkBtn(t,c){ const b=document.createElement('button'); b.className=c; b.textContent=t; return b; }

async function withBusy(btn,fn){
  const old=btn.textContent; btn.disabled=true; btn.textContent='…';
  try{ await fn(); btn.textContent=old; }
  catch(e){ if(e&&e.name==='AbortError'){ btn.textContent=old; }
    else{ console.error(e); btn.textContent='ошибка'; setTimeout(()=>{btn.textContent=old;},2200); } }
  finally{ btn.disabled=false; }
}

async function resolveHref(f){
  if(f._href) return f._href;
  let href=null, apiErr='';
  if(f.path && f._pub){
    const p=f.path.replace(/^disk:/,'');
    const u=new URL(API+'/download');
    u.searchParams.set('public_key',f._pub); u.searchParams.set('path',p);
    const r=await fetch(u);
    if(r.ok){ href=(await r.json()).href; } else apiErr='HTTP '+r.status;
  }
  if(!href) href=f.file;
  if(!href) throw new Error(apiErr||'нет ссылки');
  f._href=href; console.log('href:',href); return href;
}

async function doDownload(f){
  const href=await resolveHref(f);
  if(navigator.share){
    try{ await navigator.share({title:f.name, url:href}); return; }
    catch(e){ if(e.name==='AbortError') return; }
  }
  window.location.href=href;   // десктоп: прямое скачивание
}

function showLink(box,href){
  box.innerHTML='';
  const a=document.createElement('a'); a.className='rawlink'; a.href=href;
  a.target='_blank'; a.rel='noopener'; a.textContent=href;
  const hint=document.createElement('div'); hint.className='linkhint';
  hint.textContent='Нажми — открыть в браузере · зажми — меню';
  box.append(a,hint); box.hidden=false;
  if(navigator.clipboard) navigator.clipboard.writeText(href)
    .then(()=>{ hint.textContent='Скопировано ✓ · нажми, чтобы открыть'; }).catch(()=>{});
}

/* ---------- ИЗМЕНИТЬ ССЫЛКИ ---------- */
function closeEdit(){ $('editPanel').hidden=true; $('editPass').hidden=false; $('editFields').hidden=true;
  $('editPassInput').value=''; $('editMsg').textContent=''; }
$('btnEdit').addEventListener('click',()=>{ const p=$('editPanel'); if(p.hidden){ closeEdit(); p.hidden=false; $('editPassInput').focus(); } else closeEdit(); });
$('editCancel1').addEventListener('click',closeEdit);
$('editCancel2').addEventListener('click',closeEdit);
function editUnlock(){
  if($('editPassInput').value.trim()===PASS_EDIT){
    $('editPass').hidden=true; $('editFields').hidden=false;
    $('urlClients').value=SRC.clients.url; $('urlShop').value=SRC.shop.url;
  } else { shake($('editPanel')); $('editMsg').textContent='Неверный пароль'; $('editPassInput').value=''; }
}
$('editPassBtn').addEventListener('click',editUnlock);
$('editPassInput').addEventListener('keydown',e=>{ if(e.key==='Enter') editUnlock(); });
$('editSave').addEventListener('click',()=>{
  SRC.clients.url=$('urlClients').value.trim()||DEFAULTS.clients.url;
  SRC.shop.url=$('urlShop').value.trim()||DEFAULTS.shop.url;
  saveSources();
  for(const k in srcCache) delete srcCache[k];   // сброс кэша под новые ссылки
  closeEdit();
  setStatus('Ссылки обновлены ✓'); setTime('—');
});

/* кнопки поиска */
$('btnFind').addEventListener('click',()=>run(true));
$('btnAll').addEventListener('click',()=>run(false));
$('btnStop').addEventListener('click',()=>{ if(controller) controller.abort(); });
$('query').addEventListener('keydown',e=>{ if(e.key==='Enter') run(true); });
</script>
</body>
</html>
